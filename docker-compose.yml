name: medimage

services:
  medimage-ui:
    build: .
    ports:
      - "8083:8083"
      - "8888:80"
    environment:
      # ถ้า backend run บน host machine ให้ใช้ host.docker.internal
      # ถ้า backend อยู่ใน docker-compose เดียวกัน ให้ใช้ชื่อ service เช่น medimage-api
      - BACKEND_URL=${BACKEND_URL:-http://medimage-api:8000}
      - LS_USER=${LS_USER:-admin@medimage.local}
      - LS_PASSWORD=${LS_PASSWORD:-}
    extra_hosts:
      # ให้ container เข้าถึง host machine ผ่าน host.docker.internal
      - "host.docker.internal:host-gateway"
    depends_on:
      minio:
        condition: service_healthy
      medimage-api:
        condition: service_started
    restart: unless-stopped

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      - MINIO_ROOT_USER=minioadmin
      - MINIO_ROOT_PASSWORD=minioadmin
      - MINIO_PROMETHEUS_AUTH_TYPE=public
    volumes:
      - minio-data:/data
    ports:
      - "9000:9000"   # MinIO S3 API (needed by Ray cluster workers)
      - "9001:9001"   # MinIO Console (browser-accessible)
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  label-studio:
    image: heartexlabs/label-studio:latest
    ports:
      - "8085:8080"
    environment:
      - LABEL_STUDIO_HOST=http://localhost:8085
      - LABEL_STUDIO_USERNAME=admin@medimage.local
      - LABEL_STUDIO_PASSWORD=MedImage2026!
      - LABEL_STUDIO_USER_TOKEN=medimage-ls-token-2026
      - LABEL_STUDIO_DISABLE_SIGNUP_WITHOUT_LINK=true
      # Allow LS to show real error messages for internal S3 endpoints (e.g. minio)
      # minio:9000 has no registered TLD domain (registered_domain="")
      # Trailing comma adds "" to trusted list so real errors are surfaced
      - S3_TRUSTED_STORAGE_DOMAINS=amazonaws.com,scw.cloud,yandexcloud.net,digitaloceanspaces.com,
    volumes:
      - label-studio-data:/label-studio/data
    restart: unless-stopped

  # Creates default MinIO buckets on first startup
  minio-init:
    image: minio/minio:latest
    entrypoint: >
      sh -c "
        mc alias set local http://minio:9000 minioadmin minioadmin &&
        mc mb --ignore-existing local/medimage-raw &&
        mc mb --ignore-existing local/medimage-cxr &&
        mc mb --ignore-existing local/medimage-mri &&
        mc mb --ignore-existing local/medimage-ct &&
        echo 'MinIO buckets ready.'
      "
    depends_on:
      minio:
        condition: service_healthy
    restart: on-failure

  medimage-api:
    build: ./backend
    environment:
      - LS_API_URL=http://label-studio:8080
      - LS_PUBLIC_URL=http://100.68.3.42:8085
      - LS_USER=admin@medimage.local
      - LS_PASSWORD=admin
      - LS_TOKEN=medimage-ls-token-2026
      - MINIO_URL=http://minio:9000
      # Host IP the Ray/Modal cluster can reach on port 9000. Required
      # when the cluster is on a different host than docker-compose.
      - MINIO_HOST_IP=100.68.3.42
      - DB_PATH=/data/jobs.db
      # Keycloak realm `h-forge` runs under /kc (KC_HTTP_RELATIVE_PATH=/kc)
      - KEYCLOAK_JWKS_URL=http://medimage-keycloak-1:8080/kc/realms/h-forge/protocol/openid-connect/certs
    volumes:
      - api-data:/data
    restart: unless-stopped

  jupyter:
    image: quay.io/jupyter/scipy-notebook:latest
    environment:
      - JUPYTER_ENABLE_LAB=yes
      - GRANT_SUDO=yes
      - JUPYTER_TOKEN=${JUPYTER_TOKEN:-medimage2026}
    volumes:
      - jupyter-data:/home/jovyan/work
      - ./jupyter_config.py:/home/jovyan/.jupyter/jupyter_server_config.py:ro
      - ./notebooks:/home/jovyan/work/templates:ro
    user: root
    restart: unless-stopped

volumes:
  minio-data:
  label-studio-data:
  api-data:
  jupyter-data:
