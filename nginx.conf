server {
    listen 8083 ssl;
    ssl_certificate     /etc/nginx/ssl/cert.pem;
    ssl_certificate_key /etc/nginx/ssl/key.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # Redirect plain HTTP requests sent to the HTTPS port back as HTTPS
    error_page 497 https://$host:$server_port$request_uri;

    root /usr/share/nginx/html;
    index index.html;

    # Proxy Keycloak — browser talks HTTPS to nginx, nginx forwards HTTP to keycloak internally
    location /kc/ {
        proxy_pass http://medimage-keycloak-1:8080/kc/;
        proxy_set_header Host $host:$server_port;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Port $server_port;
        proxy_buffer_size 64k;
        proxy_buffers 8 64k;
        proxy_busy_buffers_size 128k;
    }

    # Serve React app — no cache for index.html so updates propagate immediately
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header Pragma "no-cache" always;
        add_header Expires "0" always;
        try_files $uri /index.html;
    }
    location /assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable" always;
    }
    location / {
        try_files $uri $uri/ /index.html;
    }

    # LS credentials config — served as JSON for auto-login
    # Values injected at container start via sed from LS_USER / LS_PASSWORD env vars
    location = /api/ls-config {
        default_type application/json;
        return 200 '{"email":"__LS_USER__","password":"__LS_PASSWORD__"}';
        add_header Cache-Control "no-store" always;
    }

    # Proxy LS login page — GET fetches CSRF token; POST performs login to set session cookie
    # Both GET and POST are same-origin (localhost:8083), so cookies are stored for localhost
    # and will be sent to localhost:8085 as well (RFC 6265: cookies are port-agnostic)
    location /api/ls-login/ {
        proxy_pass http://label-studio:8080/user/login/;
        proxy_set_header Host "localhost:8085";
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        # LS trusts only its own host (LABEL_STUDIO_HOST=http://localhost:8085).
        # Override Origin+Referer so Django CSRF (Origin==Host check) passes.
        proxy_set_header Origin "http://localhost:8085";
        proxy_set_header Referer "http://localhost:8085/user/login/";
        # Pass Set-Cookie headers from LS back to browser
        proxy_pass_header Set-Cookie;
        add_header Access-Control-Allow-Origin "http://localhost:8083" always;
        add_header Access-Control-Allow-Credentials "true" always;
        add_header Access-Control-Allow-Methods "GET, POST, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Content-Type" always;
    }

    # Proxy Label Studio API to avoid CORS
    location /api/ls/ {
        proxy_pass http://label-studio:8080/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        # CORS headers for browser access
        add_header Access-Control-Allow-Origin "*" always;
        add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Authorization, Content-Type" always;
    }

    # Proxy Label Studio static (images, etc)
    location /ls-static/ {
        proxy_pass http://label-studio:8080/static/;
        proxy_set_header Host $host;
    }



    # Proxy Ray Dashboard REST API — must come before generic /api catch-all
    # GPU stats — served by our own API, not Ray dashboard.
    # Must come before the /api/ray/ catch-all.
    location = /api/ray/gpu-stats {
        proxy_pass http://medimage-api:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }

    location /api/ray/ {
        rewrite ^/api/ray/(.*)$ /$1 break;
        proxy_pass http://100.68.53.118:8265;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        add_header Access-Control-Allow-Origin "*" always;
        add_header Access-Control-Allow-Methods "GET, POST, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Authorization, Content-Type" always;
    }

    # MinIO Prometheus metrics — no auth required (MINIO_PROMETHEUS_AUTH_TYPE=public)
    # Override User-Agent: MinIO 307-redirects browser UAs to the console
    location /api/minio-metrics {
        proxy_pass http://minio:9000/minio/v2/metrics/cluster;
        proxy_set_header Host minio:9000;
        proxy_set_header User-Agent "prometheus/scraper";
        add_header Access-Control-Allow-Origin "*" always;
    }

    # MinIO Console proxy (port 9001) — subpath proxy with URL rewriting
    # Auto-login works: POST /minio-console/api/v1/login sets token cookie for /minio-console/ path
    location /minio-console/ {
        proxy_pass http://minio:9001/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 86400;
        # Disable compression so sub_filter can rewrite text bodies
        proxy_set_header Accept-Encoding "identity";
        # Pass cookies and rewrite cookie Path from / to /minio-console/
        proxy_pass_header Set-Cookie;
        proxy_cookie_path / /minio-console/;
        # Rewrite absolute asset & API paths injected by MinIO Console React build
        sub_filter_types text/html text/css application/javascript;
        sub_filter_once off;
        sub_filter 'href="/'   'href="/minio-console/';
        sub_filter 'src="/'    'src="/minio-console/';
        sub_filter 'action="/' 'action="/minio-console/';
        sub_filter '"/api/v1'  '"/minio-console/api/v1';
        sub_filter "'/api/v1"  "'/minio-console/api/v1";
        sub_filter '"/ws'      '"/minio-console/ws';
    }

    # Proxy MinIO S3 API — SigV4 signed, must come before generic /api catch-all
    location /api/minio/ {
        rewrite ^/api/minio/(.*)$ /$1 break;
        proxy_pass http://minio:9000;
        proxy_set_header Host localhost:9000;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        # Pass through SigV4 auth headers unchanged
        proxy_pass_request_headers on;
        add_header Access-Control-Allow-Origin "*" always;
        add_header Access-Control-Allow-Methods "GET, PUT, POST, DELETE, HEAD, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Authorization, Content-Type, x-amz-date, x-amz-content-sha256, x-amz-security-token" always;
        if ($request_method = OPTIONS) {
            return 204;
        }
    }

    # Proxy backend API (projects, jobs, cluster, train …)
    location /api/ {
        proxy_pass __BACKEND_URL__/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 600;
        proxy_connect_timeout 60;
        proxy_send_timeout 600;
        add_header Access-Control-Allow-Origin "*" always;
        add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Authorization, Content-Type" always;
    }

    # Proxy FastAPI Swagger / ReDoc / OpenAPI schema
    location /docs {
        proxy_pass __BACKEND_URL__/docs;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    location /redoc {
        proxy_pass __BACKEND_URL__/redoc;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    location /openapi.json {
        proxy_pass __BACKEND_URL__/openapi.json;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
        add_header Access-Control-Allow-Origin "*" always;
    }

    # Proxy Jupyter Notebook/Lab — websocket support required
    location /jupyter/ {
        proxy_pass http://jupyter:8888/jupyter/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 86400;
        # Forward Jupyter session cookies back to browser correctly
        proxy_pass_header Set-Cookie;
        proxy_cookie_path /jupyter/ /jupyter/;
    }
}