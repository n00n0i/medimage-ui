server {
    listen 8083;
    root /usr/share/nginx/html;
    index index.html;

    # Serve React app
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy Label Studio API to avoid CORS
    location /api/ls/ {
        proxy_pass http://100.68.221.236:8080/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        # CORS headers for browser access
        add_header Access-Control-Allow-Origin "*" always;
        add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Authorization, Content-Type" always;
    }

    # Proxy Label Studio static (images, etc)
    location /ls-static/ {
        proxy_pass http://100.68.221.236:8080/static/;
        proxy_set_header Host $host;
    }

    # Proxy sync webhook server (bypasses Redis RQ)
    location /api/sync/ {
        rewrite ^/api/sync/(\d+)/?$ /sync/$1 break;
        proxy_pass http://100.68.221.236:8084;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        add_header Access-Control-Allow-Origin "*" always;
        add_header Access-Control-Allow-Methods "GET, POST, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Authorization, Content-Type" always;
    }
}